profile: hyph4
role: coordinator
version: "2026-04-07"

model:
  provider: openrouter
  model: deepseek/deepseek-v3.2
  thinking: true
  temperature: 0.3
  # api_key: see ~/.hermes/profiles/hyph4/config.yaml or $OPENROUTER_API_KEY

routing:
  coordinator_for: [pr0b3, 3tch, s3ntry, dr3dg3, g0blin, ph0sph0r]
  direct_handle: [general_questions, discord_routing, system_status]

agent_bus:
  incoming: ~/repos/knowledge-vault/_incoming/agent-messages/
  profiles_root: ~/.hermes/profiles/

operational_rules:
  source_diversity: "Techmeme and HN first. Reddit deprioritized."
  session_idle_timeout: 60
  no_ai_attribution: true
  stop_on_errors: true

memory:
  holographic: true
  review_cron: "0 2 * * *"

crons:
  deep_work: "0 23 * * *"
  source_crawl: "0 */6 * * *"
  vault_triage: "0 5 * * *"
  daily_summary: "0 4 * * *"
  memory_review: "0 2 * * *"

# NOTE: Discord token, OpenRouter API key, and bridge secret
# are stored in ~/.hermes/profiles/hyph4/config.yaml only.
# That file is NOT version controlled.
# Recovery: see knowledge-vault/_meta/notebooks/hdls.md
