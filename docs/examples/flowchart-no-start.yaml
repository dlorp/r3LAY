name: "Engine Won't Start - Basic Diagnosis"
description: "Systematic troubleshooting for engine crank/no-start conditions"
symptoms:
  - "Engine cranks but won't start"
  - "Engine cranks weakly then stops"
  - "No crank at all"
  - "Click but no crank"
difficulty: "beginner"
time_estimate: "30-60 minutes"
tools_required:
  - "Multimeter"
  - "Basic hand tools"
  - "Spark tester (optional but helpful)"
start_node: "start"

nodes:
  - id: "start"
    type: "question"
    text: "Does the engine crank when you turn the key to START?"
    yes_next: "cranks_check_fuel"
    no_next: "no_crank_battery"
    notes: "Cranking means the starter motor is spinning the engine. You should hear it turning over (wh-wh-wh-wh sound). Just a click is NOT cranking."

  # ===== NO CRANK BRANCH =====
  - id: "no_crank_battery"
    type: "test"
    text: "Measure battery voltage with multimeter. Should be 12.4-12.7V with engine off."
    tools_required: ["multimeter"]
    yes_next: "no_crank_sound"
    no_next: "battery_low"
    notes: "Set multimeter to DC volts (20V range). Touch red probe to positive (+) terminal, black to negative (-). <12.0V = discharged."

  - id: "battery_low"
    type: "diagnosis"
    text: "DIAGNOSIS: Battery is discharged or failed.\n\nSOLUTION:\n- Jump start and drive 30+ minutes to charge\n- If battery <2 years old: charge overnight and retest\n- If battery >4 years old: likely needs replacement\n- Have battery load tested at auto parts store (free)"
    notes: "Normal battery life: 3-5 years. Cold weather accelerates failure. If car sits unused >1 week, battery may discharge."

  - id: "no_crank_sound"
    type: "question"
    text: "Do you hear a CLICK when turning the key to START?"
    yes_next: "click_starter"
    no_next: "no_click"
    notes: "Single loud CLICK = starter solenoid engaging but starter not turning. Multiple clicks = weak battery. No sound at all = electrical issue."

  - id: "click_starter"
    type: "diagnosis"
    text: "DIAGNOSIS: Starter motor likely failed (solenoid clicks but motor doesn't turn).\n\nSOLUTION:\n- Tap starter with wrench/hammer while someone turns key (may work temporarily)\n- Check starter motor connections (clean if corroded)\n- Replace starter motor\n- Have starter tested before replacing (free at most auto parts stores)"
    notes: "Starter motors typically last 100k-150k miles. Failure is gradual (slow cranking → clicking → dead)."

  - id: "no_click"
    type: "question"
    text: "Are the dashboard lights bright when you turn the key to ON (not START)?"
    yes_next: "no_click_neutral"
    no_next: "battery_connection"
    notes: "Dashboard should light up normally. Dim lights = battery/connection issue. No lights = complete electrical failure."

  - id: "battery_connection"
    type: "diagnosis"
    text: "DIAGNOSIS: Battery connection issue or main fuse blown.\n\nSOLUTION:\n- Remove battery terminals, clean with wire brush\n- Check battery cable ends for corrosion (white/green powder)\n- Inspect main fuses in engine bay fuse box\n- Check negative battery ground cable connection to chassis/engine"
    notes: "Corrosion prevents electrical flow even if battery is good. Use baking soda + water to neutralize acid corrosion."

  - id: "no_click_neutral"
    type: "question"
    text: "Is the transmission in PARK (automatic) or NEUTRAL (manual with clutch pressed)?"
    yes_next: "neutral_safety_switch"
    no_next: "shift_to_neutral"
    notes: "Neutral safety switch prevents starting in gear. Automatic: must be in P or N. Manual: clutch must be fully depressed."

  - id: "shift_to_neutral"
    type: "diagnosis"
    text: "DIAGNOSIS: Transmission not in safe starting position.\n\nSOLUTION:\n- Automatic: Shift to PARK (P), ensure shifter is fully engaged\n- Manual: Press clutch pedal fully to floor\n- Try starting again"
    notes: "If car still won't crank in PARK/NEUTRAL: neutral safety switch may be misadjusted or failed (see next step)."

  - id: "neutral_safety_switch"
    type: "diagnosis"
    text: "DIAGNOSIS: Neutral safety switch or ignition switch may be faulty.\n\nSOLUTION:\n- Try starting in NEUTRAL instead of PARK (or vice versa)\n- Wiggle shifter while turning key\n- Check clutch pedal switch (manual transmission)\n- Have neutral safety switch tested/replaced\n- Less common: ignition switch or starter relay failed"
    notes: "Neutral safety switch prevents starting in gear (safety feature). Can wear out or become misaligned. Subaru-specific: clutch pedal switch is common failure point."

  # ===== CRANK BUT NO START BRANCH =====
  - id: "cranks_check_fuel"
    type: "question"
    text: "Can you hear the fuel pump prime when turning key to ON (not START)? Listen near rear seat/trunk for 2-3 second hum."
    yes_next: "cranks_check_spark"
    no_next: "no_fuel_pump"
    notes: "Fuel pump should run for ~2 seconds when key is turned to ON position (before starting). Quiet hum from rear of car. If loud, pump may be failing."
    obd_codes: ["P0230", "P0231", "P0232"]

  - id: "no_fuel_pump"
    type: "test"
    text: "Check fuel pump fuse and relay in fuse box. Swap relay with another similar relay and try again."
    yes_next: "cranks_check_spark"
    no_next: "fuel_pump_diagnosis"
    notes: "Fuse box location varies by model (usually under hood or under dash). Relay swap is quick test - if pump runs with different relay, original relay is bad."

  - id: "fuel_pump_diagnosis"
    type: "diagnosis"
    text: "DIAGNOSIS: Fuel pump or fuel pump circuit fault.\n\nSOLUTION:\n- Replace fuel pump fuse if blown\n- Replace fuel pump relay if swap test worked\n- Check fuel pump wiring connector (under rear seat on many Subarus)\n- If fuse/relay OK: fuel pump likely failed (expensive repair)\n- Advanced: test voltage at pump connector (should be 12V when cranking)"
    notes: "Fuel pump failure is sudden (works fine, then dead). Pumps last 100k-200k miles. Dirty fuel accelerates wear. If pump is loud/whining, it's about to fail."
    obd_codes: ["P0230", "P0231", "P0232"]

  - id: "cranks_check_spark"
    type: "test"
    text: "Remove a spark plug wire (or coil if coil-on-plug). Use spark tester or hold plug near metal with gap. Crank engine and look for blue spark."
    tools_required: ["spark tester", "spark plug socket"]
    yes_next: "has_spark_and_fuel"
    no_next: "no_spark"
    notes: "SAFETY: Keep hands clear of plug, don't touch metal. Spark should be bright blue. Weak orange/yellow spark = ignition system weak. NO spark tester? Hold plug 1/4 inch from metal."

  - id: "no_spark"
    type: "diagnosis"
    text: "DIAGNOSIS: Ignition system fault - no spark.\n\nSOLUTION:\n- Check ignition fuse and relay\n- Inspect distributor cap/rotor (if equipped) for carbon tracking\n- Test ignition coil(s) - resistance varies by model (check manual)\n- Check crankshaft position sensor (P0335 code if failed)\n- Check camshaft position sensor (P0340 code if failed)\n- If sensors OK: ignition module or ECU fault (advanced diagnosis needed)"
    notes: "Most common: bad ignition coil (coil-on-plug cars) or crank/cam sensor. Subaru: cam sensor connector corrosion is common. Check wiring for rodent damage."
    obd_codes: ["P0335", "P0340", "P0351", "P0352", "P0353", "P0354"]

  - id: "has_spark_and_fuel"
    type: "question"
    text: "Does the engine attempt to start (sputter, try to catch) or does it just crank smoothly with no change?"
    yes_next: "almost_starts"
    no_next: "cranks_no_attempt"
    notes: "Attempting = engine sounds different, like it wants to start. Just cranking = sounds the same, no change."

  - id: "almost_starts"
    type: "diagnosis"
    text: "DIAGNOSIS: Engine is getting fuel and spark but timing or fuel delivery is off.\n\nSOLUTION:\n- Check fuel pressure (needs gauge - should be ~40 psi, varies by model)\n- Inspect air filter (clogged filter prevents starting)\n- Check for vacuum leaks (large leaks prevent starting)\n- Verify ignition timing (timing belt jumped? marks aligned?)\n- Check MAF sensor (try unplugging and starting - if starts, MAF is bad)\n- Less common: clogged fuel filter, bad injectors, ECU fault"
    notes: "If it sputters and almost catches: likely fuel pressure low OR timing off. Check timing belt alignment marks (CRITICAL on Subaru - jumped belt = valve damage on interference engines)."
    obd_codes: ["P0340", "P0335", "P0171", "P0174"]

  - id: "cranks_no_attempt"
    type: "diagnosis"
    text: "DIAGNOSIS: Engine cranks normally but shows no attempt to start (uncommon - usually indicates major fault).\n\nPOSSIBLE CAUSES:\n- Timing belt broken/jumped (CHECK IMMEDIATELY)\n- Fuel pump runs but no pressure (clogged filter, failed pump)\n- No injector pulse (check fuses, injector harness)\n- Anti-theft system active (security light on dash?)\n- ECU not receiving sensor signals (crank/cam sensor)\n\nNEXT STEPS:\n- Verify timing belt is intact and aligned (timing marks)\n- Check for spark again (should be bright blue)\n- Listen for injector clicking when cranking (use stethoscope)\n- Scan for codes (P0335, P0340 common)\n- Advanced diagnosis required if basics check out"
    notes: "This scenario often means timing belt failure (Subaru) or complete ECU/sensor failure. DO NOT continue cranking if timing belt jumped - interference engines will damage valves."
    obd_codes: ["P0335", "P0340", "P0201", "P0202", "P0203", "P0204"]
